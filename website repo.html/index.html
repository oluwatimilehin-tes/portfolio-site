<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nesty</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      color: #fff;
      background: #000;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #000;
      padding: 15px 0;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: #fff;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00aaff;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      color: #00aaff;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      background: #00aaff;
      color: #fff;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    /* SECTIONS */
    section {
      padding: 100px 20px;
      text-align: center;
      background: #111;
    }

    .section-title {
      font-size: 2.2rem;
      margin-bottom: 20px;
      color: #00aaff;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #000;
      padding: 25px;
      border-radius: 10px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* FOOTER */
    footer {
      background: #000;
      padding: 20px;
      text-align: center;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
  </nav>

  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Welcome to Nesty</h1>
      <p>Elegance for your home, essentials for your table.</p>
      <button class="btn" onclick="scrollToSection('about')">Get Started</button>
    </div>
  </section>

  <section id="about">
    <h2 class="section-title">About</h2>
    <p>We offer affordable products, help with problem solving and innovation.</p>
  </section>

  <section id="services">
    <h2 class="section-title">Services</h2>
    <div class="cards">
      <div class="card">Web Design</div>
      <div class="card">Frontend Development</div>
      <div class="card">UI/UX Design</div>
    </div>
  </section>

  <footer>
    <p>© 2025 Nesty</p>
  </footer>

  <script>
    function scrollToSection(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }
  </script>

</body>
</html>
